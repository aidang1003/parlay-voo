[profile.default]
src = 'contracts'
out = 'out'
libs = ['lib']
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = true
fs_permissions = [{ access = "read-write", path = "./" }]
extra_output = ["evm.bytecode.opcodes"]

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.default.invariant]
runs = 64
depth = 32

[rpc_endpoints]
# Anvil local is the only hardcoded RPC; everything else is built from
# ALCHEMY_API_KEY in .env. Get a free key at https://dashboard.alchemy.com.
default_network = "http://127.0.0.1:8545"
localhost = "http://127.0.0.1:8545"
local = "http://127.0.0.1:8545"
mainnet = "https://eth-mainnet.g.alchemy.com/v2/${NEXT_PUBLIC_ALCHEMY_API_KEY}"
sepolia = "https://eth-sepolia.g.alchemy.com/v2/${NEXT_PUBLIC_ALCHEMY_API_KEY}"
base = "https://base-mainnet.g.alchemy.com/v2/${NEXT_PUBLIC_ALCHEMY_API_KEY}"
baseSepolia = "https://base-sepolia.g.alchemy.com/v2/${NEXT_PUBLIC_ALCHEMY_API_KEY}"
"base-sepolia" = "https://base-sepolia.g.alchemy.com/v2/${NEXT_PUBLIC_ALCHEMY_API_KEY}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
"base-sepolia" = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api", chain = 84532 }
base = { key = "${ETHERSCAN_API_KEY}", url = "https://api.basescan.org/api", chain = 8453 }

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
bracket_spacing = false
int_types = "long"
